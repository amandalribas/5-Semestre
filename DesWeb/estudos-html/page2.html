<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias</title>
</head>
<body>
    <h2>Fotos, Vídeos, Audios</h2>
    <a href="index.html">Voltar</a>
    <br>
    <p>Use img scr=".../" para colocar imagens. Podemos ajustar sua altura e largura com height e width.</p>

    <a href="https://pt.wikipedia.org/wiki/Gato">
        <img src="img.jpg" height="400" width="1000" alt="Imagem de gato pensativo na natureza." title="Gato bacana">
    </a>
    <br>
    <audio controlsautoplay muted loop src="stardewost.mp3"> <!-- controls, autoplay, muted, loop são atributos--> </audio>
    <br>
    <audio controls>
        <source src="stardewost.mp3">
        <source src="stardewost.wav">
        Audio Indisponível
    </audio>
    <br>
    <video controls src="gatovideo.mp4" autoplay muted loop width="1000" ></video>
</body>
</html>
